name: Generate Weekly Blog Post

on:
  schedule:
    # Executa toda segunda-feira às 12:00 UTC (09:00 Horário de Brasília)
    - cron: '0 12 * * 1'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    
    # Permissão para o robô do GitHub poder commitar as novas páginas de volta
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run blog post generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_blog.py
